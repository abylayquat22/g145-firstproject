<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronic shop items</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .items-row {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .item-card {
            flex: 0 1 300px;
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #e0e0e0;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .item-name {
            color: #2c3e50;
            font-size: 1.5em;
            margin-bottom: 15px;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }

        .item-description {
            color: #7f8c8d;
            margin-bottom: 20px;
            line-height: 1.6;
            min-height: 80px;
        }

        .item-price {
            color: #27ae60;
            font-size: 1.8em;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: right;
        }

        .item-price::after {
            content: " $";
            font-size: 0.8em;
            color: #7f8c8d;
        }

        .details-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
            width: 100%;
        }

        .details-btn:hover {
            background-color: #2980b9;
        }

        .separator {
            margin: 40px 0;
            border: none;
            border-top: 2px dashed #bdc3c7;
        }

        @media (max-width: 768px) {
            .item-card {
                flex: 0 1 100%;
            }

            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Electronic shop items</h1>

    <div class="items-row">
        <div class="item-card" th:each="item : ${items}">
            <h2 class="item-name" th:text="${item.name}">Mac Book Pro</h2>
            <p class="item-description" th:text="${item.description}">8 GB RAM 256 GB SSD Intel Core i7</p>
            <div class="item-price" th:text="${item.price}">1199.99</div>
            <button class="details-btn">Details</button>
        </div>
    </div>

    <hr class="separator">
</div>
</body>
</html>
