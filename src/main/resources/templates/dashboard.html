<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Notebooks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .search-form {
            background-color: #f9f9f9;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 30px;
            border: 1px solid #ddd;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: inline-block;
            width: 100px;
            font-weight: bold;
        }

        .form-group input {
            padding: 8px;
            width: 250px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }

        .search-btn {
            background-color: #4CAF50;
            color: white;
            padding: 10px 25px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-left: 105px;
        }

        .search-btn:hover {
            background-color: #45a049;
        }

        .reset-link {
            margin-left: 15px;
            color: #666;
            text-decoration: none;
        }

        .reset-link:hover {
            color: #4CAF50;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:hover {
            background-color: #f5f5f5;
        }

        .no-results {
            text-align: center;
            padding: 30px;
            color: #666;
            font-style: italic;
        }
    </style>
</head>
<body>
<h1>Notebooks Dashboard</h1>

<!-- Search Form -->
<div class="search-form">
    <form action="/notebooks/search" method="get">
        <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Enter notebookSearchRequest name..."
                   th:value="${param.name != null ? param.name[0] : ''}">
        </div>

        <div class="form-group">
            <label for="price">Max Price:</label>
            <input type="number" id="price" name="price" step="0.01" min="0"
                   placeholder="Enter maximum price..."
                   th:value="${param.price != null ? param.price[0] : ''}">
        </div>

        <button type="submit" class="search-btn">Search Notebooks</button>
        <a href="/dashboard" class="reset-link">Reset Search</a>
    </form>
</div>

<!-- Results Table -->
<table>
    <thead>
    <tr>
        <th>Name</th>
        <th>Brand</th>
        <th>Price</th>
        <th>Details</th>
    </tr>
    </thead>
    <tbody>
    <tr th:if="${notebooks.empty}">
        <td colspan="4" class="no-results">No notebooks found matching your criteria</td>
    </tr>
    <tr th:each="notebookSearchRequest : ${notebooks}">
        <td th:text="${notebookSearchRequest.name}"></td>
        <td th:text="${notebookSearchRequest.brand}"></td>
        <td th:text="'$' + ${notebookSearchRequest.price}"></td>
        <td>
            <a th:href="${'/notebooks/details/' + notebookSearchRequest.getId()}">Details</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
