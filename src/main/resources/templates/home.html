<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Phones</title>
    <style>
        table { border-collapse: collapse; width: 100%; max-width: 900px; margin: 20px auto; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background: #f4f4f4; }
        .no-data { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>
<h1 style="text-align:center;">Список телефонов</h1>

<div th:if="${#lists.isEmpty(phones)}" class="no-data">
    Нет телефонов для отображения.
</div>

<table th:if="${!#lists.isEmpty(phones)}">
    <thead>
    <tr>
        <th>Название</th>
        <th>Бренд</th>
        <th>Цена</th>
        <th>Описание</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="phone : ${phones}">
        <td th:text="${phone.name}">Name</td>
        <td th:text="${phone.brand}">Brand</td>
        <td th:text="${phone.price}">Price</td>
        <td th:text="${phone.description}">Description</td>
    </tr>
    </tbody>
</table>
</body>
</html>
